apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: patient-monitoring-ingress
  namespace: patient-monitoring
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - patient-monitoring.example.com
    secretName: patient-monitoring-tls
  rules:
  - host: patient-monitoring.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: patient-monitoring-backend
            port:
              number: 80
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: patient-monitoring-backend
            port:
              number: 80
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: patient-monitoring-backend
            port:
              number: 80
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: patient-monitoring-backend
            port:
              number: 80
