apiVersion: v1
kind: Secret
metadata:
  name: patient-monitoring-secrets
  namespace: patient-monitoring
type: Opaque
stringData:
  database_url: "postgresql+asyncpg://postgres:your-secure-password@patient-monitoring-db:5432/patient_monitoring"
  redis_url: "redis://patient-monitoring-redis:6379"
  jwt_secret: "your-jwt-secret-change-in-production"
  db_user: "postgres"
  db_password: "your-secure-password"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patient-monitoring-backend
  namespace: patient-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: patient-monitoring-backend
  namespace: patient-monitoring
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patient-monitoring-backend
  namespace: patient-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: patient-monitoring-backend
subjects:
- kind: ServiceAccount
  name: patient-monitoring-backend
  namespace: patient-monitoring
