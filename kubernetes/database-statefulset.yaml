apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: patient-monitoring
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: patient-monitoring-db
  namespace: patient-monitoring
spec:
  serviceName: patient-monitoring-db
  replicas: 1
  selector:
    matchLabels:
      app: patient-monitoring-db
  template:
    metadata:
      labels:
        app: patient-monitoring-db
    spec:
      containers:
      - name: postgres
        image: timescale/timescaledb:latest-pg15
        imagePullPolicy: IfNotPresent
        ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRES_DB
          value: patient_monitoring
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: patient-monitoring-secrets
              key: db_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: patient-monitoring-secrets
              key: db_password
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 1000m
            memory: 4Gi
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: patient-monitoring-db
  namespace: patient-monitoring
  labels:
    app: patient-monitoring-db
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: patient-monitoring-db
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
