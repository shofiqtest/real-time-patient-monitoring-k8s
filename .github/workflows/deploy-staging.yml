name: Deploy to Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.patient-monitoring.example.com
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name patient-monitoring-staging --region eu-west-1
      
      - name: Deploy with Helm
        run: |
          helm repo add patient-monitoring https://charts.patient-monitoring.example.com
          helm repo update
          helm upgrade --install patient-monitoring ./helm/patient-monitoring \
            --namespace patient-monitoring \
            --create-namespace \
            --values ./helm/patient-monitoring/values-staging.yaml \
            --wait \
            --timeout 5m
      
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/patient-monitoring-backend -n patient-monitoring
          kubectl get pods -n patient-monitoring
      
      - name: Run smoke tests
        run: |
          sleep 30
          kubectl run smoke-test --image=curlimages/curl --rm -i --restart=Never -- \
            curl -f http://patient-monitoring-backend/health || exit 1
      
      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Deployment to Staging: *${{ job.status }}*\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
