name: Deploy to Production

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://patient-monitoring.example.com
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name patient-monitoring-production --region eu-west-1
      
      - name: Pre-deployment checks
        run: |
          kubectl get nodes
          kubectl get pods -n patient-monitoring
      
      - name: Create backup
        run: |
          kubectl exec -n patient-monitoring patient-monitoring-db-0 -- \
            pg_dump -U postgres patient_monitoring > backup.sql
      
      - name: Deploy with Helm (Blue-Green)
        run: |
          # Deploy new version with suffix
          helm upgrade --install patient-monitoring-green ./helm/patient-monitoring \
            --namespace patient-monitoring \
            --values ./helm/patient-monitoring/values-production.yaml \
            --wait \
            --timeout 10m
          
          # Switch traffic
          kubectl patch service patient-monitoring-backend -n patient-monitoring \
            -p '{"spec":{"selector":{"version":"v1"}}}'
      
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/patient-monitoring-backend -n patient-monitoring
          kubectl get pods -n patient-monitoring -l app=patient-monitoring-backend
      
      - name: Run integration tests
        run: |
          sleep 30
          bash ./tests/integration-tests.sh
      
      - name: Health checks
        run: |
          for i in {1..5}; do
            kubectl exec -n patient-monitoring patient-monitoring-backend-0 -- \
              curl -f http://localhost:8000/health || exit 1
          done
      
      - name: Create release notes
        id: release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
      
      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Production Deployment: *${{ job.status }}*\nVersion: ${{ github.ref }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
