"""
Prometheus alerting rules
"""

groups:
  - name: patient_monitoring
    interval: 30s
    rules:
      - alert: BackendServiceDown
        expr: up{job="patient-monitoring-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "Patient monitoring backend service has been unavailable for 1 minute"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 5 minutes"

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes{pod_name=~"patient-monitoring.*"} / container_spec_memory_limit_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Pod {{ $labels.pod_name }} memory usage is above 80%"

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total{pod_name=~"patient-monitoring.*"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "Pod {{ $labels.pod_name }} CPU usage is above 80%"

      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool is exhausted"
          description: "Database connections are above 90% of max limit"

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis service is unavailable"

      - alert: DiskSpaceRunningOut
        expr: node_filesystem_avail_bytes{device=~"/dev/.*"} / node_filesystem_size_bytes < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space running out"
          description: "Available disk space is below 10% on {{ $labels.node }}"
